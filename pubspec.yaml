name: cupertino_liquid_glass
description: >
  Flutter widgets replicating Apple's iOS Liquid Glass visual style. BackdropFilter blur,
  specular highlights, spring tab bar. A visual approximation — not a native UIKit bridge.
version: 0.5.0
homepage: https://github.com/erenmalkoc/cupertino_liquid_glass
repository: https://github.com/erenmalkoc/cupertino_liquid_glass
issue_tracker: https://github.com/erenmalkoc/cupertino_liquid_glass/issues

topics:
  - ui
  - cupertino
  - blur
  - glass
  - ios

funding:
  - https://github.com/sponsors/erenmalkoc

environment:
  sdk: ^3.11.3
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

